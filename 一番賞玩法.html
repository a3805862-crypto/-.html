<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貓蟲家族一番賞</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    background:#dfe4ec;
    overflow-x:hidden;
}

/* =================== 上方功能列 =================== */

.top-bar{
    background:#cfe6ff;
    padding:14px;
    display:flex;
    justify-content:center;
    gap:14px;
    position:sticky;
    top:0;
    z-index:100;
    border-bottom:4px solid #b8d5f5;
}

.top-btn{
    background:white;
    border:none;
    border-radius:22px;
    width:110px;
    height:68px;
    font-size:18px;
    font-weight:bold;
    box-shadow:0 5px 10px rgba(0,0,0,.15);
    cursor:pointer;
}

/* =================== 主題 =================== */

.theme-area{
    text-align:center;
    padding:25px 15px 10px;
}

#themeTitle{
    font-size:52px;
    font-weight:bold;
    margin-bottom:15px;
    color:#00d9ff;
}

#noticeText{
    font-size:20px;
    white-space:pre-wrap;
    color:#444;
    margin-bottom:20px;
}

/* =================== 資訊區 =================== */

.info-box{
    background:white;
    width:90%;
    margin:auto;
    border-radius:25px;
    padding:18px;
    line-height:2;
    font-size:18px;
    box-shadow:0 3px 8px rgba(0,0,0,.1);
}

/* =================== 籤紙區 =================== */

.ticket-area{
    padding:25px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:14px;
}

.ticket{
    aspect-ratio:1/1;
    border-radius:25px;
    background:#6d6d6d;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    user-select:none;
    transition:.2s;
}

.ticket.opened{
    background:white;
    color:black;
    border:3px solid black;
    pointer-events:none;
}

/* =================== 彈窗 =================== */

.popup-bg{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup{
    width:92%;
    max-width:520px;
    max-height:90vh;
    overflow:auto;
    background:white;
    border-radius:28px;
    padding:20px;
}

.popup h2{
    margin-bottom:18px;
}

.input{
    width:100%;
    padding:14px;
    border-radius:15px;
    border:1px solid #ccc;
    margin-bottom:12px;
    font-size:16px;
}

.row{
    display:flex;
    gap:10px;
}

.btn{
    flex:1;
    border:none;
    padding:14px;
    border-radius:16px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

.save-btn{
    background:#2ba8ff;
    color:white;
}

.back-btn{
    background:#ddd;
}

/* =================== 獎項列 =================== */

.prize-line{
    border:1px solid #ccc;
    padding:12px;
    border-radius:16px;
    margin-bottom:12px;
}

/* =================== 抽獎 =================== */

.draw-bg{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.ticket-wrap{
    width:320px;
    height:560px;
    position:relative;
    overflow:hidden;
}

.inner-layer{
    position:absolute;
    inset:0;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:42px;
    font-weight:bold;
}

.outer-layer{
    position:absolute;
    inset:0;
    background:#222;
    overflow:hidden;
    touch-action:none;
}

.outer-layer img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.ticket-id{
    position:absolute;
    top:10px;
    right:10px;
    background:white;
    color:black;
    padding:10px 18px;
    border-radius:16px;
    font-size:18px;
    font-weight:bold;
    z-index:10;
}

.slide-text{
    color:white;
    margin-top:16px;
    font-size:18px;
}

.confirm-btn{
    margin-top:20px;
    border:none;
    background:white;
    border-radius:18px;
    padding:14px 40px;
    font-size:20px;
    display:none;
}

/* =================== 彩帶 =================== */

.confetti{
    position:fixed;
    width:12px;
    height:12px;
    animation:fall 2s linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-50px) rotate(0deg);
    }
    to{
        transform:translateY(100vh) rotate(720deg);
        opacity:0;
    }
}

</style>
</head>

<body>

<!-- 上方 -->

<div class="top-bar">

    <button class="top-btn" onclick="pageMenu()">頁數</button>

    <button class="top-btn" onclick="resetPage()">重置</button>

    <button class="top-btn" onclick="openSetting()">設定</button>

</div>

<!-- 主題 -->

<div class="theme-area">

    <div id="themeTitle">貓蟲家族一番賞</div>

    <div id="noticeText">公告欄</div>

</div>

<!-- 資訊 -->

<div class="info-box" id="infoBox"></div>

<!-- 籤紙 -->

<div class="ticket-area" id="ticketArea"></div>

<!-- 設定框 -->

<div class="popup-bg" id="settingPopup">

    <div class="popup">

        <h2>設定頁面</h2>

        <input class="input" id="themeInput" placeholder="主題名稱">

        <input type="color" class="input" id="themeColor" value="#00d9ff">

        <textarea class="input" id="noticeInput" placeholder="公告欄"></textarea>

        <input type="number" class="input" id="totalInput" placeholder="籤紙總數">

        <div id="prizeList"></div>

        <button class="btn" onclick="addPrize()">新增獎項</button>

        <br><br>

        <input class="input" id="loseText" placeholder="未中獎文字">

        <input type="file" class="input" id="imageInput" accept="image/*">

        <div class="row">

            <button class="btn save-btn" onclick="saveSetting()">儲存設定</button>

            <button class="btn back-btn" onclick="closeSetting()">返回</button>

        </div>

    </div>

</div>

<!-- 抽獎 -->

<div class="draw-bg" id="drawBg">

    <div class="ticket-wrap">

        <div class="inner-layer" id="innerText"></div>

        <div class="outer-layer" id="outerLayer">

            <div class="ticket-id" id="ticketId">001</div>

            <img id="ticketImg">

        </div>

    </div>

    <div class="slide-text">向左滑動撕開</div>

    <button class="confirm-btn" id="confirmBtn" onclick="closeDraw()">確認</button>

</div>

<script>

/* =================== 資料 =================== */

let data = JSON.parse(localStorage.getItem("lotterySave")) || {

    currentPage:0,

    pages:[
        {
            name:"Capoo的一番賞",
            color:"#000000",
            notice:"B賞：入3000紅包\n一抽：300元",
            total:80,
            prizes:[
                {number:"001",text:"A賞"},
                {number:"008",text:"B賞"}
            ],
            loseText:"銘謝惠顧",
            image:"",
            opened:[]
        }
    ]

};

let currentNumber = "";

function saveData(){

    localStorage.setItem("lotterySave",JSON.stringify(data));

}

function page(){

    return data.pages[data.currentPage];

}

/* =================== 渲染 =================== */

function render(){

    let p = page();

    document.getElementById("themeTitle").innerText = p.name;

    document.getElementById("themeTitle").style.color = p.color;

    document.getElementById("noticeText").innerText = p.notice;

    let remain = p.total - p.opened.length;

    let html = `
        <div>總數：${p.total}</div>
        <div>剩餘：${remain}</div>
    `;

    let countMap = {};

    p.prizes.forEach(a=>{

        countMap[a.text] = (countMap[a.text] || 0)+1;

    });

    for(let k in countMap){

        html += `<div>${k} 數量：${countMap[k]}</div>`;

    }

    document.getElementById("infoBox").innerHTML = html;

    let area = document.getElementById("ticketArea");

    area.innerHTML = "";

    for(let i=1;i<=p.total;i++){

        let num = String(i).padStart(3,"0");

        let div = document.createElement("div");

        div.className = "ticket";

        if(p.opened.includes(num)){

            div.classList.add("opened");

        }

        div.innerText = num;

        div.onclick = ()=>selectTicket(num);

        area.appendChild(div);

    }

    saveData();

}

/* =================== 點擊籤紙 =================== */

function selectTicket(num){

    if(!confirm("是否選擇 "+num+" 號？")) return;

    currentNumber = num;

    let p = page();

    let prize = p.prizes.find(a=>a.number==num);

    let text = prize ? prize.text : p.loseText;

    document.getElementById("drawBg").style.display = "flex";

    document.getElementById("innerText").innerText = text;

    document.getElementById("ticketId").innerText = num;

    document.getElementById("ticketImg").src = p.image || "";

    initSlide(text);

}

/* =================== 滑動 =================== */

function initSlide(text){

    let outer = document.getElementById("outerLayer");

    outer.style.display = "block";

    outer.style.transform = "translateX(0px)";

    let startX = 0;

    outer.onpointerdown = e=>{

        startX = e.clientX;

        outer.onpointermove = ev=>{

            let move = ev.clientX - startX;

            if(move < 0) move = 0;

            outer.style.transform = `translateX(${move}px)`;

            if(move > 70){

                outer.style.display = "none";

                finishDraw(text);

            }

        };

    };

    outer.onpointerup = ()=>{

        outer.onpointermove = null;

    };

}

/* =================== 完成抽獎 =================== */

function finishDraw(text){

    let p = page();

    if(!p.opened.includes(currentNumber)){

        p.opened.push(currentNumber);

    }

    if(text != p.loseText){

        for(let i=0;i<80;i++){

            let c = document.createElement("div");

            c.className = "confetti";

            c.style.left = Math.random()*100+"vw";

            c.style.background = `hsl(${Math.random()*360}deg,100%,50%)`;

            document.body.appendChild(c);

            setTimeout(()=>c.remove(),2000);

        }

    }

    document.getElementById("confirmBtn").style.display = "block";

    render();

}

/* =================== 關閉抽獎 =================== */

function closeDraw(){

    document.getElementById("drawBg").style.display = "none";

    document.getElementById("confirmBtn").style.display = "none";

}

/* =================== 開啟設定 =================== */

function openSetting(){

    let p = page();

    document.getElementById("settingPopup").style.display = "flex";

    document.getElementById("themeInput").value = p.name;

    document.getElementById("themeColor").value = p.color;

    document.getElementById("noticeInput").value = p.notice;

    document.getElementById("totalInput").value = p.total;

    document.getElementById("loseText").value = p.loseText;

    document.getElementById("prizeList").innerHTML = "";

    p.prizes.forEach(a=>{

        createPrizeLine(a.number,a.text);

    });

}

/* =================== 關閉設定 =================== */

function closeSetting(){

    document.getElementById("settingPopup").style.display = "none";

}

/* =================== 新增獎項 =================== */

function addPrize(){

    createPrizeLine("001","");

}

function createPrizeLine(number,text){

    let div = document.createElement("div");

    div.className = "prize-line";

    div.innerHTML = `

        <input class="input numInput" value="${number}" placeholder="編號">

        <input class="input textInput" value="${text}" placeholder="獎項文字">

        <button class="btn" onclick="removePrize(this)">刪除</button>

    `;

    document.getElementById("prizeList").appendChild(div);

}

function removePrize(btn){

    let lines = document.querySelectorAll(".prize-line");

    if(lines.length<=1){

        alert("至少保留一行");

        return;

    }

    btn.parentElement.remove();

}

/* =================== 儲存設定 =================== */

function saveSetting(){

    if(!confirm("是否確定儲存")) return;

    let p = page();

    p.name = document.getElementById("themeInput").value;

    p.color = document.getElementById("themeColor").value;

    p.notice = document.getElementById("noticeInput").value;

    p.total = Number(document.getElementById("totalInput").value);

    p.loseText = document.getElementById("loseText").value;

    let arr = [];

    document.querySelectorAll(".prize-line").forEach(line=>{

        let num = line.querySelector(".numInput").value;

        num = String(Number(num)).padStart(3,"0");

        let text = line.querySelector(".textInput").value;

        arr.push({
            number:num,
            text:text
        });

    });

    if(arr.length > p.total){

        alert("數量不符無法儲存");

        return;

    }

    p.prizes = arr;

    let file = document.getElementById("imageInput").files[0];

    if(file){

        let reader = new FileReader();

        reader.onload = e=>{

            p.image = e.target.result;

            saveData();

            render();

        };

        reader.readAsDataURL(file);

    }

    saveData();

    render();

    closeSetting();

}

/* =================== 重置 =================== */

function resetPage(){

    if(!confirm("是否重置目前頁面")) return;

    page().opened = [];

    saveData();

    render();

}

/* =================== 頁面 =================== */

function pageMenu(){

    let action = prompt(
`輸入功能：

1 = 新增頁面
2 = 切換頁面
3 = 刪除目前頁面`
    );

    if(action=="1"){

        let name = prompt("輸入頁面名稱");

        if(!name) return;

        data.pages.push({

            name:name,
            color:"#00d9ff",
            notice:"",
            total:80,
            prizes:[
                {number:"001",text:"A賞"}
            ],
            loseText:"銘謝惠顧",
            image:"",
            opened:[]

        });

        data.currentPage = data.pages.length-1;

    }

    else if(action=="2"){

        let text = "輸入頁面編號切換：\n\n";

        data.pages.forEach((p,i)=>{

            text += `${i+1}. ${p.name}\n`;

        });

        let choose = prompt(text);

        if(!choose) return;

        data.currentPage = Number(choose)-1;

    }

    else if(action=="3"){

        if(data.pages.length<=1){

            alert("至少保留一頁");

            return;

        }

        if(confirm("確定刪除目前頁面？")){

            data.pages.splice(data.currentPage,1);

            data.currentPage = 0;

        }

    }

    saveData();

    render();

}

render();

</script>

</body>
</html>
