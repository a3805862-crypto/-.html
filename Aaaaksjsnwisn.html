<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貓蟲家族一番賞</title>

<style>
body{
    margin:0;
    font-family:"Microsoft JhengHei","Noto Sans TC",sans-serif;
    background:#eaf3ff;
}

/* ===== 標題 ===== */
.header{
    background:#4aa3ff;
    color:black;
    font-size:32px;
    font-weight:900;
    text-align:center;
    padding:18px;
}

/* ===== 功能列 ===== */
.topBar{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    background:#d9ecff;
}

.btn{
    padding:10px 16px;
    border-radius:12px;
    border:none;
    background:white;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 2px 5px rgba(0,0,0,0.15);
}

/* ===== 頁面 ===== */
.pageTitle{
    text-align:center;
    font-size:24px;
    font-weight:800;
}
.pageNotice{
    text-align:center;
    font-size:14px;
    color:#333;
}

/* ===== 籤紙 ===== */
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    padding:10px;
}

.ticket{
    height:55px;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    font-weight:800;
    cursor:pointer;
}

.ticket.used{
    background:gray;
    pointer-events:none;
}

/* ===== 設定 ===== */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.box{
    width:320px;
    background:white;
    border-radius:12px;
    padding:15px;
}

.box input{
    width:100%;
    margin:5px 0;
    padding:6px;
}

/* ===== 撕開 ===== */
.scratch{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:340px;
    height:150px;
    background:white;
    border-radius:12px;
    overflow:hidden;
    display:none;
}

.bottom{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:22px;
    font-weight:900;
}

.top{
    position:absolute;
    width:100%;
    height:100%;
    background:#777;
    transition:0.8s;
}

.scratch.open .top{
    transform:translateX(100%);
}

.confirmBtn{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    padding:6px 14px;
    border:none;
    border-radius:10px;
    background:#4aa3ff;
    color:white;
    font-weight:700;
    cursor:pointer;
}

/* 彩帶 */
.piece{
    position:absolute;
    width:8px;
    height:8px;
}
</style>
</head>

<body>

<div class="header">貓蟲家族一番賞</div>

<div class="topBar">
    <button class="btn" onclick="addPage()">新增頁</button>
    <button class="btn" onclick="resetPage()">重置</button>
    <button class="btn" onclick="openSetting()">設定</button>
    <button class="btn" onclick="nextPage()">切換頁</button>
</div>

<div class="pageTitle" id="title"></div>
<div class="pageNotice" id="notice"></div>

<div class="grid" id="grid"></div>

<!-- 設定 -->
<div class="modal" id="modal">
<div class="box">
<h3>設定</h3>
名稱<input id="setName"><br>
公告<input id="setNotice"><br>
籤紙數<input id="setTotal" type="number"><br>

<button class="btn" onclick="saveSetting()">儲存</button>
<button class="btn" onclick="closeSetting()">取消</button>
</div>
</div>

<!-- 撕開 -->
<div class="scratch" id="scratch">
    <div class="bottom" id="scratchText"></div>
    <div class="top"></div>
</div>

<script>

let pages=[{
    name:"預設頁",
    notice:"歡迎抽獎",
    total:12,
    prizes:{"003":"大獎","008":"二獎"},
    used:{}
}];

let now=0;

/* ===== 渲染 ===== */
function render(){
    let p=pages[now];

    title.innerText=p.name;
    notice.innerText=p.notice;

    grid.innerHTML="";

    for(let i=1;i<=p.total;i++){
        let id=String(i).padStart(3,"0");

        let d=document.createElement("div");
        d.className="ticket"+(p.used[id]?" used":"");
        d.innerText=id;

        d.onclick=()=>openTicket(id);

        grid.appendChild(d);
    }
}

/* ===== 新頁 ===== */
function addPage(){
    pages.push({
        name:"新頁",
        notice:"",
        total:12,
        prizes:{},
        used:{}
    });
    now=pages.length-1;
    render();
}

/* ===== 切換頁 ===== */
function nextPage(){
    now=(now+1)%pages.length;
    render();
}

/* ===== 重置 ===== */
function resetPage(){
    if(confirm("確定重置？")){
        pages[now].used={};
        render();
    }
}

/* ===== 設定 ===== */
function openSetting(){
    let p=pages[now];
    setName.value=p.name;
    setNotice.value=p.notice;
    setTotal.value=p.total;
    modal.style.display="flex";
}

function closeSetting(){
    modal.style.display="none";
}

function saveSetting(){
    if(!confirm("確定儲存？")) return;

    let p=pages[now];
    let t=parseInt(setTotal.value);

    if(t < Object.keys(p.prizes).length){
        alert("籤紙不足獎品數");
        return;
    }

    p.name=setName.value;
    p.notice=setNotice.value;
    p.total=t;

    closeSetting();
    render();
}

/* ===== 抽籤 ===== */
function openTicket(id){
    let p=pages[now];

    let prize=p.prizes[id]||"未中獎";

    scratch.style.display="block";
    scratchText.innerText=prize;

    let topLayer=scratch.querySelector(".top");
    topLayer.style.transform="translateX(0)";
    scratch.classList.remove("open");

    setTimeout(()=>{
        scratch.classList.add("open");
    },100);

    scratch.onclick=null;

    let btn=document.createElement("button");
    btn.className="confirmBtn";
    btn.innerText="確認";

    btn.onclick=()=>{
        if(prize!=="未中獎"){
            fire();
        }

        p.used[id]=true;
        scratch.style.display="none";
        btn.remove();
        render();
    };

    scratch.appendChild(btn);
}

/* ===== 彩帶 ===== */
function fire(){
    for(let i=0;i<40;i++){
        let c=document.createElement("div");
        c.className="piece";
        c.style.left=Math.random()*100+"%";
        c.style.top="0";
        c.style.background=`hsl(${Math.random()*360},100%,50%)`;
        document.body.appendChild(c);

        let y=0;
        let t=setInterval(()=>{
            y+=6;
            c.style.top=y+"px";
            if(y>600){
                clearInterval(t);
                c.remove();
            }
        },20);
    }
}

render();

</script>
</body>
</html>
