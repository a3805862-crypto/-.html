<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貓蟲家族一番賞</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    background:#edf5ff;
    overflow-x:hidden;
}

/* ===== 頂部 ===== */

.header{
    background:#4ea4ff;
    color:#000;
    text-align:center;
    font-size:34px;
    font-weight:900;
    padding:18px;
    letter-spacing:2px;
}

/* ===== 功能列 ===== */

.topBar{
    background:#d8ebff;
    display:flex;
    justify-content:center;
    gap:12px;
    padding:12px;
    border-bottom:2px solid #bddcff;
}

.btn{
    border:none;
    background:#fff;
    padding:11px 18px;
    border-radius:14px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.btn:active{
    transform:scale(.95);
}

/* ===== 主題 ===== */

.pageArea{
    padding:12px;
}

.pageTitle{
    text-align:center;
    font-size:28px;
    font-weight:900;
    margin-top:5px;
}

.pageNotice{
    text-align:center;
    color:#444;
    margin-top:6px;
    margin-bottom:14px;
    white-space:pre-wrap;
}

/* ===== 籤紙 ===== */

.ticketGrid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.ticket{
    aspect-ratio:1/1;
    background:#000;
    color:#fff;
    border-radius:14px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
    font-weight:900;
    cursor:pointer;
    user-select:none;
}

.ticket.used{
    background:#777;
    pointer-events:none;
}

/* ===== 彈窗 ===== */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modalBox{
    width:92%;
    max-width:420px;
    max-height:90vh;
    overflow:auto;
    background:#fff;
    border-radius:18px;
    padding:16px;
}

.modalTitle{
    font-size:24px;
    font-weight:900;
    margin-bottom:14px;
}

.input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:12px;
}

.row{
    display:flex;
    gap:8px;
    margin-bottom:10px;
}

.row input{
    flex:1;
}

/* ===== 撕開 ===== */

.scratchModal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.scratchBox{
    width:90%;
    max-width:420px;
}

.scratchCard{
    position:relative;
    width:100%;
    aspect-ratio:7/3;
    overflow:hidden;
    border-radius:18px;
}

.bottomLayer{
    position:absolute;
    inset:0;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:28px;
    font-weight:900;
}

.topLayer{
    position:absolute;
    inset:0;
    background:#8d8d8d;
    transition:1s;
}

.confirmBtn{
    width:100%;
    margin-top:14px;
    border:none;
    background:#4ea4ff;
    color:#fff;
    padding:14px;
    border-radius:14px;
    font-size:18px;
    font-weight:900;
}

/* ===== 彩帶 ===== */

.confetti{
    position:fixed;
    width:10px;
    height:10px;
    top:-20px;
    z-index:2000;
}

</style>
</head>

<body>

<div class="header">貓蟲家族一番賞</div>

<div class="topBar">
    <button class="btn" onclick="openPageManager()">頁數</button>
    <button class="btn" onclick="resetPage()">重置</button>
    <button class="btn" onclick="openSetting()">設定</button>
</div>

<div class="pageArea">
    <div class="pageTitle" id="pageTitle"></div>
    <div class="pageNotice" id="pageNotice"></div>
    <div class="ticketGrid" id="ticketGrid"></div>
</div>

<!-- ===== 頁數管理 ===== -->

<div class="modal" id="pageModal">
    <div class="modalBox">

        <div class="modalTitle">頁數管理</div>

        <select class="input" id="pageSelect"></select>

        <button class="btn" onclick="switchPage()">切換頁面</button>
        <button class="btn" onclick="addPage()">新增頁面</button>
        <button class="btn" onclick="deletePage()">刪除頁面</button>
        <button class="btn" onclick="closePageManager()">返回</button>

    </div>
</div>

<!-- ===== 設定 ===== -->

<div class="modal" id="settingModal">
    <div class="modalBox">

        <div class="modalTitle">頁面設定</div>

        <div>名稱</div>
        <input class="input" id="setTitle">

        <div>獎品告示欄</div>
        <textarea class="input" id="setNotice"></textarea>

        <div>籤紙總數</div>
        <input type="number" class="input" id="setTotal">

        <div>中獎文字與編號</div>

        <div id="prizeArea"></div>

        <button class="btn" onclick="addPrizeRow()">新增獎項</button>

        <hr style="margin:14px 0;">

        <div>未設定編號的預設文字</div>
        <input class="input" id="defaultPrizeText" placeholder="例如：未中獎">

        <button class="btn" onclick="saveSetting()">儲存</button>
        <button class="btn" onclick="cancelSetting()">取消</button>
        <button class="btn" onclick="closeSetting()">返回</button>

    </div>
</div>

<!-- ===== 撕開 ===== -->

<div class="scratchModal" id="scratchModal">

    <div class="scratchBox">

        <div class="scratchCard">

            <div class="bottomLayer" id="scratchText"></div>

            <div class="topLayer" id="topLayer"></div>

        </div>

        <button class="confirmBtn" onclick="confirmScratch()">確認</button>

    </div>

</div>

<script>

let pages=[
{
    title:"預設頁",
    notice:"歡迎抽獎",
    total:12,
    prizes:{
        "003":"A賞",
        "007":"B賞"
    },
    defaultText:"未中獎",
    used:{}
}
];

let currentPage=0;
let currentTicket="";

/* ===== 渲染 ===== */

function render(){

    let p=pages[currentPage];

    pageTitle.innerText=p.title;
    pageNotice.innerText=p.notice;

    ticketGrid.innerHTML="";

    for(let i=1;i<=p.total;i++){

        let num=String(i).padStart(3,"0");

        let div=document.createElement("div");

        div.className="ticket";

        if(p.used[num]){
            div.classList.add("used");
        }

        div.innerText=num;

        div.onclick=()=>openScratch(num);

        ticketGrid.appendChild(div);
    }
}

/* ===== 頁數管理 ===== */

function openPageManager(){

    pageModal.style.display="flex";

    pageSelect.innerHTML="";

    pages.forEach((p,index)=>{

        let op=document.createElement("option");

        op.value=index;
        op.innerText=`${index+1}. ${p.title}`;

        pageSelect.appendChild(op);

    });

    pageSelect.value=currentPage;
}

function closePageManager(){
    pageModal.style.display="none";
}

function switchPage(){

    currentPage=parseInt(pageSelect.value);

    closePageManager();

    render();
}

function addPage(){

    pages.push({
        title:"新頁面",
        notice:"",
        total:12,
        prizes:{},
        defaultText:"未中獎",
        used:{}
    });

    currentPage=pages.length-1;

    closePageManager();

    render();
}

function deletePage(){

    if(pages.length<=1){
        alert("至少要保留一頁");
        return;
    }

    if(confirm("確定刪除？")){

        pages.splice(currentPage,1);

        currentPage=0;

        closePageManager();

        render();
    }
}

/* ===== 設定 ===== */

function openSetting(){

    let p=pages[currentPage];

    settingModal.style.display="flex";

    setTitle.value=p.title;
    setNotice.value=p.notice;
    setTotal.value=p.total;

    defaultPrizeText.value=p.defaultText;

    prizeArea.innerHTML="";

    let keys=Object.keys(p.prizes);

    if(keys.length===0){

        addPrizeRow();

    }else{

        keys.forEach(k=>{

            addPrizeRow(k,p.prizes[k]);

        });

    }
}

function closeSetting(){
    settingModal.style.display="none";
}

function cancelSetting(){

    if(confirm("確定取消設定？")){
        closeSetting();
    }
}

function addPrizeRow(number="",text=""){

    let div=document.createElement("div");

    div.className="row";

    div.innerHTML=`
        <input placeholder="編號 001" value="${number}">
        <input placeholder="中獎文字" value="${text}">
        <button class="btn" onclick="this.parentElement.remove()">刪除</button>
    `;

    prizeArea.appendChild(div);
}

function saveSetting(){

    if(!confirm("確定儲存設定？")){
        return;
    }

    let p=pages[currentPage];

    let total=parseInt(setTotal.value);

    let rows=prizeArea.querySelectorAll(".row");

    let prizes={};

    let count=0;

    rows.forEach(r=>{

        let num=r.children[0].value.trim();
        let text=r.children[1].value.trim();

        if(num && text){

            prizes[num]=text;
            count++;
        }

    });

    if(count>total){

        alert("數量不符無法儲存");
        return;
    }

    p.title=setTitle.value;
    p.notice=setNotice.value;
    p.total=total;
    p.prizes=prizes;
    p.defaultText=defaultPrizeText.value || "未中獎";

    closeSetting();

    render();
}

/* ===== 重置 ===== */

function resetPage(){

    if(confirm("確定重置本頁抽獎狀態？")){

        pages[currentPage].used={};

        render();
    }
}

/* ===== 撕開 ===== */

function openScratch(num){

    let p=pages[currentPage];

    currentTicket=num;

    scratchModal.style.display="flex";

    let text=p.prizes[num] || p.defaultText;

    scratchText.innerText=text;

    topLayer.style.transition="0s";
    topLayer.style.transform="translateX(0)";

    setTimeout(()=>{

        topLayer.style.transition="1s";
        topLayer.style.transform="translateX(100%)";

    },50);
}

function confirmScratch(){

    let p=pages[currentPage];

    let text=p.prizes[currentTicket] || p.defaultText;

    p.used[currentTicket]=true;

    if(p.prizes[currentTicket]){
        confetti();
    }

    scratchModal.style.display="none";

    render();
}

/* ===== 彩帶 ===== */

function confetti(){

    for(let i=0;i<45;i++){

        let div=document.createElement("div");

        div.className="confetti";

        div.style.left=Math.random()*100+"vw";

        div.style.background=
        `hsl(${Math.random()*360},100%,50%)`;

        document.body.appendChild(div);

        let y=-20;

        let speed=Math.random()*6+4;

        let timer=setInterval(()=>{

            y+=speed;

            div.style.top=y+"px";

            if(y>window.innerHeight){

                clearInterval(timer);

                div.remove();
            }

        },16);
    }
}

render();

</script>

</body>
</html>
