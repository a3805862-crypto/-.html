<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貓蟲家族一番賞</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft JhengHei",sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#eef5ff;
overflow-x:hidden;
}

/* ===== 頂部 ===== */

.header{
padding:18px;
text-align:center;
font-size:38px;
font-weight:900;
background:#4aa3ff;
color:#000;
letter-spacing:2px;
transition:.3s;
}

.topBar{
display:flex;
justify-content:center;
gap:12px;
padding:12px;
background:#d9ecff;
border-bottom:2px solid #bfdcff;
}

.btn{
border:none;
padding:12px 18px;
border-radius:16px;
font-size:15px;
font-weight:900;
background:white;
cursor:pointer;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.btn:active{
transform:scale(.95);
}

/* ===== 主區 ===== */

.main{
padding:16px;
}

.pageTitle{
font-size:32px;
font-weight:900;
text-align:center;
margin-bottom:8px;
}

.notice{
text-align:center;
white-space:pre-wrap;
color:#444;
margin-bottom:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.ticket{
aspect-ratio:1/1;
border-radius:16px;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:900;
cursor:pointer;
transition:.2s;
}

.ticket.used{
background:#777 !important;
color:#fff !important;
pointer-events:none;
}

/* ===== 視窗 ===== */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.box{
width:92%;
max-width:500px;
max-height:90vh;
overflow:auto;
background:#fff;
border-radius:22px;
padding:18px;
}

.box h2{
margin-bottom:15px;
}

.input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ccc;
margin-bottom:12px;
}

.row{
display:flex;
gap:8px;
margin-bottom:10px;
}

.row input{
flex:1;
}

/* ===== 色票 ===== */

.colorWrap{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:14px;
}

.colorBox{
width:38px;
height:38px;
border-radius:12px;
border:3px solid transparent;
cursor:pointer;
}

.colorBox.active{
border-color:#000;
}

/* ===== 顏色預覽 ===== */

.preview{
border-radius:18px;
padding:14px;
margin-bottom:16px;
border:2px dashed #ccc;
}

.previewTitle{
font-size:28px;
font-weight:900;
text-align:center;
}

/* ===== 刮刮卡 ===== */

.scratchModal{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.scratchWrap{
width:92%;
max-width:520px;
}

.card{
position:relative;
width:100%;
aspect-ratio:7/4;
border-radius:22px;
overflow:hidden;
}

.bottomLayer{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
font-weight:900;
}

.topLayer{
position:absolute;
inset:0;
overflow:hidden;
touch-action:none;
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

.paper{
position:absolute;
inset:0;
background:
linear-gradient(rgba(255,255,255,.2),rgba(0,0,0,.06)),
repeating-linear-gradient(
45deg,
rgba(255,255,255,.08) 0px,
rgba(255,255,255,.08) 2px,
transparent 2px,
transparent 6px
);
}

.topNum{
position:absolute;
top:12px;
right:14px;
font-size:22px;
font-weight:900;
z-index:5;
}

.dragText{
position:absolute;
bottom:12px;
left:0;
right:0;
text-align:center;
font-weight:900;
}

/* ===== 確認 ===== */

.confirmBtn{
width:100%;
padding:15px;
margin-top:16px;
border:none;
border-radius:16px;
background:#4aa3ff;
color:white;
font-size:18px;
font-weight:900;
display:none;
}

/* ===== 圖片調整 ===== */

.cropArea{
position:relative;
width:100%;
aspect-ratio:7/4;
border-radius:18px;
overflow:hidden;
background:#ddd;
touch-action:none;
margin-bottom:12px;
}

.cropImg{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
transform-origin:center;
}

/* ===== 彩帶 ===== */

.confetti{
position:fixed;
width:10px;
height:10px;
top:-20px;
z-index:99999;
}

</style>
</head>

<body>

<div class="header" id="header">
貓蟲家族一番賞
</div>

<div class="topBar">

<button class="btn" onclick="openPageModal()">
頁數
</button>

<button class="btn" onclick="resetPage()">
重置
</button>

<button class="btn" onclick="openSetting()">
設定
</button>

</div>

<div class="main">

<div class="pageTitle" id="pageTitle"></div>

<div class="notice" id="notice"></div>

<div class="grid" id="grid"></div>

</div>

<!-- ===== 頁數 ===== -->

<div class="modal" id="pageModal">

<div class="box">

<h2>頁數管理</h2>

<select class="input" id="pageSelect"></select>

<button class="btn" onclick="switchPage()">
切換頁面
</button>

<button class="btn" onclick="addPage()">
新增頁面
</button>

<button class="btn" onclick="deletePage()">
刪除頁面
</button>

<button class="btn" onclick="closePageModal()">
返回
</button>

</div>
</div>

<!-- ===== 設定 ===== -->

<div class="modal" id="settingModal">

<div class="box">

<h2>設定</h2>

<div class="preview" id="headerPreview">

<div class="previewTitle" id="previewText">
貓蟲家族一番賞
</div>

</div>

<div>主標題文字</div>
<input class="input" id="headerText">

<div>主標題背景色</div>
<input type="color" class="input" id="headerBg">

<div>主標題文字色</div>
<input type="color" class="input" id="headerColor">

<hr><br>

<div>頁面名稱</div>
<input class="input" id="setTitle">

<div>公告欄</div>
<textarea class="input" id="setNotice"></textarea>

<div>籤紙總數</div>
<input type="number" class="input" id="setTotal">

<hr><br>

<div>方形籤紙顏色</div>
<div class="colorWrap" id="ticketColors"></div>

<div>方形編號顏色</div>
<input type="color" class="input" id="ticketTextColor">

<hr><br>

<div>刮卡底層顏色</div>
<div class="colorWrap" id="bottomColors"></div>

<div>底層文字顏色</div>
<input type="color" class="input" id="bottomTextColor">

<hr><br>

<div>刮卡表層顏色</div>
<div class="colorWrap" id="topColors"></div>

<div>表層編號顏色</div>
<input type="color" class="input" id="topTextColor">

<div>選擇圖片</div>
<input type="file"
class="input"
accept="image/*"
id="imgInput">

<button class="btn"
onclick="removeImage()">
刪除圖片
</button>

<hr><br>

<div>中獎文字與編號</div>

<div id="prizeArea"></div>

<button class="btn"
onclick="addPrize()">
新增獎項
</button>

<br><br>

<div>沒設定獎項文字</div>

<input class="input"
id="defaultText"
placeholder="未中獎">

<button class="btn"
onclick="saveSetting()">
儲存
</button>

<button class="btn"
onclick="cancelSetting()">
取消
</button>

<button class="btn"
onclick="closeSetting()">
返回
</button>

</div>
</div>

<!-- ===== 圖片調整 ===== -->

<div class="modal" id="cropModal">

<div class="box">

<h2>圖片調整</h2>

<div class="cropArea" id="cropArea">

<img id="cropImg"
class="cropImg">

</div>

<button class="btn"
onclick="finishCrop()">
確定
</button>

</div>
</div>

<!-- ===== 刮卡 ===== -->

<div class="scratchModal"
id="scratchModal">

<div class="scratchWrap">

<div class="card">

<div class="bottomLayer"
id="bottomLayer"></div>

<div class="topLayer"
id="topLayer">

<div class="paper"></div>

<div class="topNum"
id="topNum"></div>

<div class="dragText">
← 左往右撕開
</div>

</div>

</div>

<button class="confirmBtn"
id="confirmBtn"
onclick="confirmScratch()">

確認

</button>

</div>
</div>

<script>

/* ===== 顏色 ===== */

const palette=[
"#000000","#ffffff","#ff4d4d","#ff9800",
"#ffd54f","#4caf50","#00bcd4","#2196f3",
"#673ab7","#e91e63","#795548","#607d8b",
"#8bc34a","#ffc0cb","#9c27b0","#3f51b5",
"#ff5722","#009688","#cddc39","#607d8b"
];

/* ===== 預設 ===== */

let pages=[{

title:"預設頁",
notice:"歡迎抽獎",
total:12,

prizes:{
"003":"A賞",
"008":"B賞"
},

defaultText:"未中獎",

used:{},

ticketColor:"#000000",
ticketTextColor:"#ffffff",

bottomColor:"#ffffff",
bottomTextColor:"#000000",

topColor:"#d9d9d9",
topTextColor:"#000000",

topImage:""

}];

/* ===== 標題 ===== */

let headerData={

text:"貓蟲家族一番賞",
bg:"#4aa3ff",
color:"#000000"

};

let currentPage=0;
let currentTicket="";
let scratched=false;

/* ===== 圖片 ===== */

let cropData={
x:0,
y:0,
scale:1
};

/* ===== 儲存 ===== */

function saveMemory(){

localStorage.setItem(
"catbug_kuji_v5",
JSON.stringify({

pages,
headerData,
currentPage

})
);
}

function loadMemory(){

let data=
localStorage.getItem(
"catbug_kuji_v5"
);

if(data){

let obj=JSON.parse(data);

pages=obj.pages;
headerData=obj.headerData;
currentPage=obj.currentPage;
}
}

/* ===== 三位數 ===== */

function pad(v){

v=v.replace(/\D/g,'');

if(v==="") return "";

return String(parseInt(v))
.padStart(3,"0");
}

/* ===== 顏色 ===== */

function buildColors(id,selected){

let area=
document.getElementById(id);

area.innerHTML="";

palette.forEach(c=>{

let div=
document.createElement("div");

div.className="colorBox";

if(c===selected){
div.classList.add("active");
}

div.style.background=c;

div.onclick=()=>{

area.querySelectorAll(".colorBox")
.forEach(v=>v.classList.remove("active"));

div.classList.add("active");

area.dataset.value=c;
};

area.appendChild(div);

});
}

/* ===== 渲染 ===== */

function render(){

header.innerText=
headerData.text;

header.style.background=
headerData.bg;

header.style.color=
headerData.color;

let p=pages[currentPage];

pageTitle.innerText=p.title;

notice.innerText=p.notice;

grid.innerHTML="";

for(let i=1;i<=p.total;i++){

let num=
String(i).padStart(3,"0");

let div=
document.createElement("div");

div.className="ticket";

if(p.used[num]){
div.classList.add("used");
}

div.style.background=
p.ticketColor;

div.style.color=
p.ticketTextColor;

div.innerText=num;

div.onclick=()=>openScratch(num);

grid.appendChild(div);
}
}

/* ===== 頁數 ===== */

function openPageModal(){

pageModal.style.display="flex";

pageSelect.innerHTML="";

pages.forEach((p,i)=>{

let op=
document.createElement("option");

op.value=i;

op.innerText=
`${i+1}. ${p.title}`;

pageSelect.appendChild(op);
});

pageSelect.value=currentPage;
}

function closePageModal(){
pageModal.style.display="none";
}

function switchPage(){

currentPage=
parseInt(pageSelect.value);

saveMemory();

closePageModal();

render();
}

function addPage(){

pages.push({

title:"新頁面",
notice:"",
total:12,

prizes:{},

defaultText:"未中獎",

used:{},

ticketColor:"#000000",
ticketTextColor:"#ffffff",

bottomColor:"#ffffff",
bottomTextColor:"#000000",

topColor:"#d9d9d9",
topTextColor:"#000000",

topImage:""

});

currentPage=
pages.length-1;

saveMemory();

closePageModal();

render();
}

function deletePage(){

if(pages.length<=1){

alert("至少保留一頁");

return;
}

if(confirm("確定刪除頁面？")){

pages.splice(currentPage,1);

currentPage=0;

saveMemory();

closePageModal();

render();
}
}

/* ===== 設定 ===== */

function openSetting(){

let p=pages[currentPage];

settingModal.style.display="flex";

headerText.value=
headerData.text;

headerBg.value=
headerData.bg;

headerColor.value=
headerData.color;

setTitle.value=p.title;

setNotice.value=p.notice;

setTotal.value=p.total;

ticketTextColor.value=
p.ticketTextColor;

bottomTextColor.value=
p.bottomTextColor;

topTextColor.value=
p.topTextColor;

defaultText.value=
p.defaultText;

buildColors(
"ticketColors",
p.ticketColor
);

buildColors(
"bottomColors",
p.bottomColor
);

buildColors(
"topColors",
p.topColor
);

ticketColors.dataset.value=
p.ticketColor;

bottomColors.dataset.value=
p.bottomColor;

topColors.dataset.value=
p.topColor;

prizeArea.innerHTML="";

let keys=
Object.keys(p.prizes);

if(keys.length===0){

addPrize();

}else{

keys.forEach(k=>{

addPrize(k,p.prizes[k]);

});
}

updateHeaderPreview();
}

function closeSetting(){
settingModal.style.display="none";
}

function cancelSetting(){

if(confirm("確定取消設定？")){

closeSetting();
}
}

/* ===== 標題預覽 ===== */

function updateHeaderPreview(){

headerPreview.style.background=
headerBg.value;

previewText.style.color=
headerColor.value;

previewText.innerText=
headerText.value;
}

headerText.oninput=
updateHeaderPreview;

headerBg.oninput=
updateHeaderPreview;

headerColor.oninput=
updateHeaderPreview;

/* ===== 獎項 ===== */

function addPrize(
num="",
text=""
){

let row=
document.createElement("div");

row.className="row";

row.innerHTML=`

<input
placeholder="編號"
value="${num}"
oninput="
this.value=
pad(this.value)
">

<input
placeholder="中獎文字"
value="${text}">

<button
class="btn"
onclick="removePrize(this)">
刪除
</button>
`;

prizeArea.appendChild(row);
}

function removePrize(btn){

if(prizeArea.children.length<=1){

alert("至少保留一行");

return;
}

btn.parentElement.remove();
}

/* ===== 圖片 ===== */

imgInput.onchange=e=>{

let file=
e.target.files[0];

if(!file) return;

let reader=
new FileReader();

reader.onload=v=>{

cropImg.src=v.target.result;

cropModal.style.display=
"flex";
};

reader.readAsDataURL(file);
};

let imgScale=1;
let imgX=0;
let imgY=0;

let startX=0;
let startY=0;

cropArea.addEventListener(
"touchstart",
e=>{

startX=
e.touches[0].clientX;

startY=
e.touches[0].clientY;
});

cropArea.addEventListener(
"touchmove",
e=>{

imgX+=
e.touches[0].clientX-startX;

imgY+=
e.touches[0].clientY-startY;

startX=
e.touches[0].clientX;

startY=
e.touches[0].clientY;

updateCrop();
});

cropArea.addEventListener(
"wheel",
e=>{

e.preventDefault();

imgScale+=
e.deltaY*-0.001;

if(imgScale<0.5) imgScale=.5;
if(imgScale>3) imgScale=3;

updateCrop();
});

function updateCrop(){

cropImg.style.transform=
`translate(calc(-50% + ${imgX}px),
calc(-50% + ${imgY}px))
scale(${imgScale})`;
}

function finishCrop(){

pages[currentPage].topImage=
cropImg.src;

cropModal.style.display=
"none";
}

function removeImage(){

if(confirm("刪除圖片？")){

pages[currentPage].topImage="";

saveMemory();

alert("已刪除");
}
}

/* ===== 儲存 ===== */

function saveSetting(){

if(!confirm("確定儲存？")){
return;
}

let total=
parseInt(setTotal.value);

let prizes={};

let count=0;

document
.querySelectorAll("#prizeArea .row")
.forEach(r=>{

let num=
r.children[0].value.trim();

let text=
r.children[1].value.trim();

if(num && text){

prizes[num]=text;

count++;
}
});

if(count>total){

alert("數量不符無法儲存");

return;
}

headerData.text=
headerText.value;

headerData.bg=
headerBg.value;

headerData.color=
headerColor.value;

pages[currentPage]={

...pages[currentPage],

title:setTitle.value,

notice:setNotice.value,

total:total,

prizes:prizes,

defaultText:
defaultText.value || "未中獎",

ticketColor:
ticketColors.dataset.value,

ticketTextColor:
ticketTextColor.value,

bottomColor:
bottomColors.dataset.value,

bottomTextColor:
bottomTextColor.value,

topColor:
topColors.dataset.value,

topTextColor:
topTextColor.value

};

saveMemory();

closeSetting();

render();
}

/* ===== 重置 ===== */

function resetPage(){

if(confirm("確定重置本頁？")){

pages[currentPage].used={};

saveMemory();

render();
}
}

/* ===== 刮卡 ===== */

function openScratch(num){

currentTicket=num;

scratched=false;

let p=pages[currentPage];

let text=
p.prizes[num] ||
p.defaultText;

bottomLayer.innerText=text;

bottomLayer.style.background=
p.bottomColor;

bottomLayer.style.color=
p.bottomTextColor;

topNum.innerText=num;

topNum.style.color=
p.topTextColor;

topLayer.style.backgroundColor=
p.topColor;

if(p.topImage){

topLayer.style.backgroundImage=
`url(${p.topImage})`;

}else{

topLayer.style.backgroundImage=
"";
}

topLayer.style.transform=
"translateX(0)";

confirmBtn.style.display=
"none";

scratchModal.style.display=
"flex";
}

let start=0;

topLayer.addEventListener(
"touchstart",
e=>{

start=
e.touches[0].clientX;
});

topLayer.addEventListener(
"touchmove",
e=>{

if(scratched) return;

let move=
e.touches[0].clientX-start;

if(move<0) move=0;

let max=
topLayer.offsetWidth;

if(move>max) move=max;

topLayer.style.transform=
`translateX(${move}px)`;

if(move>max*.72){

scratched=true;

topLayer.style.transition=
".25s";

topLayer.style.transform=
`translateX(${max}px)`;
}
});

topLayer.addEventListener(
"touchend",
()=>{

if(!scratched){

topLayer.style.transition=
".25s";

topLayer.style.transform=
"translateX(0)";

return;
}

finishScratch();
});

function finishScratch(){

confirmBtn.style.display=
"block";

if(
pages[currentPage]
.prizes[currentTicket]
){

confetti();
}
}

function confirmScratch(){

pages[currentPage]
.used[currentTicket]=true;

saveMemory();

scratchModal.style.display=
"none";

render();
}

/* ===== 彩帶 ===== */

function confetti(){

for(let i=0;i<80;i++){

let div=
document.createElement("div");

div.className="confetti";

div.style.left=
Math.random()*100+"vw";

div.style.background=
`hsl(${Math.random()*360},
100%,50%)`;

document.body.appendChild(div);

let y=-20;

let speed=
Math.random()*7+4;

let rotate=
Math.random()*360;

let timer=
setInterval(()=>{

y+=speed;

rotate+=8;

div.style.top=y+"px";

div.style.transform=
`rotate(${rotate}deg)`;

if(y>window.innerHeight){

clearInterval(timer);

div.remove();
}

},16);
}
}

/* ===== 啟動 ===== */

loadMemory();

render();

</script>

</body>
</html>
