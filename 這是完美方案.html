<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>貓蟲家族一番賞</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft JhengHei",sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#eef5ff;
overflow-x:hidden;
}

/* ===== 主標題 ===== */

.header{
background:#4da7ff;
color:#000;
font-size:36px;
font-weight:900;
text-align:center;
padding:18px;
letter-spacing:2px;
transition:.3s;
}

/* ===== 功能列 ===== */

.topBar{
background:#d9ebff;
display:flex;
justify-content:center;
gap:10px;
padding:12px;
border-bottom:2px solid #bddcff;
}

.btn{
border:none;
background:#fff;
padding:12px 18px;
border-radius:15px;
font-size:15px;
font-weight:900;
cursor:pointer;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.btn:active{
transform:scale(.95);
}

/* ===== 主畫面 ===== */

.pageArea{
padding:14px;
}

.pageTitle{
font-size:32px;
font-weight:900;
text-align:center;
}

.pageNotice{
margin-top:8px;
margin-bottom:18px;
text-align:center;
white-space:pre-wrap;
color:#444;
}

/* ===== 籤紙 ===== */

.ticketGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.ticket{
aspect-ratio:1/1;
border-radius:16px;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:900;
cursor:pointer;
transition:.2s;
}

.ticket.used{
background:#777 !important;
color:#fff !important;
pointer-events:none;
}

/* ===== 視窗 ===== */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modalBox{
width:92%;
max-width:470px;
max-height:90vh;
overflow:auto;
background:#fff;
border-radius:22px;
padding:18px;
}

.modalTitle{
font-size:26px;
font-weight:900;
margin-bottom:15px;
}

.input{
width:100%;
padding:11px;
border-radius:12px;
border:1px solid #ccc;
margin-bottom:12px;
}

.row{
display:flex;
gap:8px;
margin-bottom:10px;
}

.row input{
flex:1;
}

hr{
margin:16px 0;
border:none;
border-top:1px solid #ddd;
}

/* ===== 色票 ===== */

.colorGrid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
margin-bottom:14px;
}

.colorBtn{
height:40px;
border-radius:12px;
border:3px solid transparent;
cursor:pointer;
}

.colorBtn.active{
border-color:#000;
}

/* ===== 刮開 ===== */

.scratchModal{
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
}

.scratchWrap{
width:92%;
max-width:520px;
}

.scratchCard{
position:relative;
width:100%;
aspect-ratio:7/4;
overflow:hidden;
border-radius:20px;
}

/* ===== 底層 ===== */

.bottomLayer{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
font-weight:900;
}

/* ===== 表層 ===== */

.topLayer{
position:absolute;
inset:0;
overflow:hidden;
touch-action:none;
background-size:cover;
background-repeat:no-repeat;
background-position:center;
}

.paperTexture{
position:absolute;
inset:0;
background:
linear-gradient(rgba(255,255,255,.2),rgba(0,0,0,.05)),
repeating-linear-gradient(
45deg,
rgba(255,255,255,.08) 0px,
rgba(255,255,255,.08) 2px,
transparent 2px,
transparent 6px
);
}

.topText{
position:absolute;
top:14px;
right:14px;
font-size:22px;
font-weight:900;
z-index:5;
}

.dragText{
position:absolute;
bottom:14px;
left:0;
right:0;
text-align:center;
font-weight:900;
font-size:18px;
}

/* ===== 確認 ===== */

.confirmBtn{
width:100%;
padding:15px;
margin-top:16px;
border:none;
border-radius:16px;
background:#4da7ff;
color:#fff;
font-size:18px;
font-weight:900;
display:none;
}

/* ===== 彩帶 ===== */

.confetti{
position:fixed;
width:10px;
height:10px;
top:-20px;
z-index:99999;
}

</style>
</head>

<body>

<div class="header" id="header">
貓蟲家族一番賞
</div>

<div class="topBar">

<button class="btn" onclick="openPageModal()">
頁數
</button>

<button class="btn" onclick="resetPage()">
重置
</button>

<button class="btn" onclick="openSetting()">
設定
</button>

</div>

<div class="pageArea">

<div class="pageTitle" id="pageTitle"></div>

<div class="pageNotice" id="pageNotice"></div>

<div class="ticketGrid" id="ticketGrid"></div>

</div>

<!-- ===== 頁數 ===== -->

<div class="modal" id="pageModal">

<div class="modalBox">

<div class="modalTitle">
頁數管理
</div>

<select class="input" id="pageSelect"></select>

<button class="btn" onclick="switchPage()">
切換頁面
</button>

<button class="btn" onclick="addPage()">
新增頁面
</button>

<button class="btn" onclick="deletePage()">
刪除頁面
</button>

<button class="btn" onclick="closePageModal()">
返回
</button>

</div>
</div>

<!-- ===== 設定 ===== -->

<div class="modal" id="settingModal">

<div class="modalBox">

<div class="modalTitle">
頁面設定
</div>

<div>主標題文字</div>
<input class="input" id="headerText">

<div>主標題背景色</div>
<input type="color" class="input" id="headerBg">

<div>主標題文字顏色</div>
<input type="color" class="input" id="headerColor">

<hr>

<div>頁面名稱</div>
<input class="input" id="setTitle">

<div>公告欄</div>
<textarea class="input" id="setNotice"></textarea>

<div>籤紙總數</div>
<input type="number" class="input" id="setTotal">

<hr>

<div>方形籤紙顏色</div>
<div class="colorGrid" id="ticketColorGrid"></div>

<div>方形編號顏色</div>
<input type="color" class="input" id="ticketTextColor">

<hr>

<div>刮卡底層顏色</div>
<div class="colorGrid" id="bottomColorGrid"></div>

<div>刮卡底層文字顏色</div>
<input type="color" class="input" id="bottomTextColor">

<hr>

<div>刮卡表層顏色</div>
<div class="colorGrid" id="topColorGrid"></div>

<div>刮卡表層編號顏色</div>
<input type="color" class="input" id="topTextColor">

<div>表層圖片</div>
<input type="file"
class="input"
id="topImage"
accept="image/*">

<div>圖片位置 X</div>
<input type="range"
min="0"
max="100"
value="50"
class="input"
id="imgX">

<div>圖片位置 Y</div>
<input type="range"
min="0"
max="100"
value="50"
class="input"
id="imgY">

<div>圖片縮放</div>
<input type="range"
min="50"
max="250"
value="100"
class="input"
id="imgScale">

<button class="btn"
onclick="removeImage()">
刪除圖片
</button>

<hr>

<div>中獎文字與編號</div>

<div id="prizeArea"></div>

<button class="btn"
onclick="addPrizeRow()">
新增獎項
</button>

<hr>

<div>未設定獎項文字</div>

<input class="input"
id="defaultText"
placeholder="未中獎">

<button class="btn"
onclick="saveSetting()">
儲存
</button>

<button class="btn"
onclick="cancelSetting()">
取消
</button>

<button class="btn"
onclick="closeSetting()">
返回
</button>

</div>
</div>

<!-- ===== 刮開 ===== -->

<div class="scratchModal"
id="scratchModal">

<div class="scratchWrap">

<div class="scratchCard">

<div class="bottomLayer"
id="scratchText"></div>

<div class="topLayer"
id="topLayer">

<div class="paperTexture"></div>

<div class="topText"
id="topNumber"></div>

<div class="dragText">
← 由左向右撕開
</div>

</div>

</div>

<button class="confirmBtn"
id="confirmBtn"
onclick="confirmScratch()">

確認

</button>

</div>
</div>

<script>

/* ===== 色票 ===== */

const colors=[
"#000000","#ffffff","#ff4d4d","#ff9800","#ffd54f",
"#4caf50","#00bcd4","#2196f3","#673ab7","#e91e63",
"#795548","#607d8b","#9e9e9e","#8bc34a","#ffb6c1"
];

/* ===== 儲存 ===== */

function saveMemory(){

localStorage.setItem(
"catbug_kuji_data_v4",
JSON.stringify({

pages,
headerData,
currentPage

})
);
}

function loadMemory(){

let data=
localStorage.getItem(
"catbug_kuji_data_v4"
);

if(data){

let obj=JSON.parse(data);

pages=obj.pages;
headerData=obj.headerData;
currentPage=obj.currentPage;
}
}

/* ===== 預設 ===== */

let pages=[{

title:"預設頁",
notice:"歡迎抽獎",
total:12,

prizes:{
"003":"A賞",
"008":"B賞"
},

defaultText:"未中獎",

used:{},

ticketColor:"#000000",
ticketTextColor:"#ffffff",

bottomColor:"#ffffff",
bottomTextColor:"#000000",

topColor:"#d9d9d9",
topTextColor:"#000000",

topImage:"",
imgX:50,
imgY:50,
imgScale:100

}];

/* ===== 標題 ===== */

let headerData={

text:"貓蟲家族一番賞",
bg:"#4da7ff",
color:"#000000"

};

let currentPage=0;
let currentTicket="";
let scratched=false;

let selectedTicketColor="#000000";
let selectedBottomColor="#ffffff";
let selectedTopColor="#d9d9d9";

/* ===== 三位數 ===== */

function formatNumber(v){

v=v.replace(/\D/g,'');

if(v==="") return "";

return String(parseInt(v))
.padStart(3,"0");
}

/* ===== 色票 ===== */

function createColorGrid(id,selected){

let area=
document.getElementById(id);

area.innerHTML="";

colors.forEach(c=>{

let div=
document.createElement("div");

div.className="colorBtn";

if(c===selected){
div.classList.add("active");
}

div.style.background=c;

div.onclick=()=>{

area.querySelectorAll(".colorBtn")
.forEach(b=>b.classList.remove("active"));

div.classList.add("active");

if(id==="ticketColorGrid"){
selectedTicketColor=c;
}

if(id==="bottomColorGrid"){
selectedBottomColor=c;
}

if(id==="topColorGrid"){
selectedTopColor=c;
}
};

area.appendChild(div);

});
}

/* ===== 標題 ===== */

function renderHeader(){

header.innerText=
headerData.text;

header.style.background=
headerData.bg;

header.style.color=
headerData.color;
}

/* ===== 渲染 ===== */

function render(){

renderHeader();

let p=pages[currentPage];

pageTitle.innerText=p.title;

pageNotice.innerText=p.notice;

ticketGrid.innerHTML="";

for(let i=1;i<=p.total;i++){

let num=
String(i).padStart(3,"0");

let div=
document.createElement("div");

div.className="ticket";

if(p.used[num]){
div.classList.add("used");
}

div.style.background=
p.ticketColor;

div.style.color=
p.ticketTextColor;

div.innerText=num;

div.onclick=()=>openScratch(num);

ticketGrid.appendChild(div);
}
}

/* ===== 頁數 ===== */

function openPageModal(){

pageModal.style.display="flex";

pageSelect.innerHTML="";

pages.forEach((p,index)=>{

let op=
document.createElement("option");

op.value=index;

op.innerText=
`${index+1}. ${p.title}`;

pageSelect.appendChild(op);

});

pageSelect.value=currentPage;
}

function closePageModal(){
pageModal.style.display="none";
}

function switchPage(){

currentPage=
parseInt(pageSelect.value);

saveMemory();

closePageModal();

render();
}

function addPage(){

pages.push({

title:"新頁面",
notice:"",
total:12,

prizes:{},

defaultText:"未中獎",

used:{},

ticketColor:"#000000",
ticketTextColor:"#ffffff",

bottomColor:"#ffffff",
bottomTextColor:"#000000",

topColor:"#d9d9d9",
topTextColor:"#000000",

topImage:"",
imgX:50,
imgY:50,
imgScale:100

});

currentPage=
pages.length-1;

saveMemory();

closePageModal();

render();
}

function deletePage(){

if(pages.length<=1){

alert("至少保留一頁");

return;
}

if(confirm("確定刪除頁面？")){

pages.splice(currentPage,1);

currentPage=0;

saveMemory();

closePageModal();

render();
}
}

/* ===== 設定 ===== */

function openSetting(){

let p=pages[currentPage];

settingModal.style.display="flex";

headerText.value=
headerData.text;

headerBg.value=
headerData.bg;

headerColor.value=
headerData.color;

setTitle.value=p.title;

setNotice.value=p.notice;

setTotal.value=p.total;

ticketTextColor.value=
p.ticketTextColor;

bottomTextColor.value=
p.bottomTextColor;

topTextColor.value=
p.topTextColor;

defaultText.value=
p.defaultText;

imgX.value=p.imgX;
imgY.value=p.imgY;
imgScale.value=p.imgScale;

selectedTicketColor=
p.ticketColor;

selectedBottomColor=
p.bottomColor;

selectedTopColor=
p.topColor;

createColorGrid(
"ticketColorGrid",
p.ticketColor
);

createColorGrid(
"bottomColorGrid",
p.bottomColor
);

createColorGrid(
"topColorGrid",
p.topColor
);

prizeArea.innerHTML="";

let keys=
Object.keys(p.prizes);

if(keys.length===0){

addPrizeRow();

}else{

keys.forEach(k=>{

addPrizeRow(
k,
p.prizes[k]
);

});
}
}

function closeSetting(){

settingModal.style.display=
"none";
}

function cancelSetting(){

if(confirm("確定取消設定？")){

closeSetting();
}
}

function addPrizeRow(
num="",
text=""
){

let div=
document.createElement("div");

div.className="row";

div.innerHTML=`

<input
placeholder="編號"
value="${num}"
oninput="
this.value=
formatNumber(this.value)
">

<input
placeholder="中獎文字"
value="${text}">

<button
class="btn"
onclick="removePrizeRow(this)">
刪除
</button>
`;

prizeArea.appendChild(div);
}

function removePrizeRow(btn){

if(prizeArea.children.length<=1){

alert("至少保留一行");

return;
}

btn.parentElement.remove();
}

function removeImage(){

if(confirm("刪除圖片？")){

pages[currentPage].topImage="";

saveMemory();

alert("已刪除圖片");
}
}

function saveSetting(){

if(!confirm("確定儲存設定？")){
return;
}

let total=
parseInt(setTotal.value);

let rows=
prizeArea.querySelectorAll(".row");

let prizes={};

let count=0;

rows.forEach(r=>{

let num=
r.children[0].value.trim();

let text=
r.children[1].value.trim();

if(num && text){

prizes[num]=text;

count++;
}
});

if(count>total){

alert("數量不符無法儲存");

return;
}

let file=
topImage.files[0];

let imageData=
pages[currentPage].topImage;

function finishSave(){

headerData.text=
headerText.value;

headerData.bg=
headerBg.value;

headerData.color=
headerColor.value;

pages[currentPage]={

...pages[currentPage],

title:setTitle.value,

notice:setNotice.value,

total:total,

prizes:prizes,

defaultText:
defaultText.value || "未中獎",

ticketColor:
selectedTicketColor,

ticketTextColor:
ticketTextColor.value,

bottomColor:
selectedBottomColor,

bottomTextColor:
bottomTextColor.value,

topColor:
selectedTopColor,

topTextColor:
topTextColor.value,

topImage:imageData,

imgX:imgX.value,
imgY:imgY.value,
imgScale:imgScale.value

};

saveMemory();

closeSetting();

render();
}

if(file){

let reader=
new FileReader();

reader.onload=e=>{

imageData=e.target.result;

finishSave();
};

reader.readAsDataURL(file);

}else{

finishSave();
}
}

/* ===== 重置 ===== */

function resetPage(){

if(confirm("確定重置本頁抽獎狀態？")){

pages[currentPage].used={};

saveMemory();

render();
}
}

/* ===== 刮開 ===== */

function openScratch(num){

currentTicket=num;

scratched=false;

let p=pages[currentPage];

let text=
p.prizes[num] ||
p.defaultText;

scratchText.innerText=text;

scratchText.style.background=
p.bottomColor;

scratchText.style.color=
p.bottomTextColor;

topNumber.innerText=num;

topNumber.style.color=
p.topTextColor;

topLayer.style.backgroundColor=
p.topColor;

if(p.topImage){

topLayer.style.backgroundImage=
`url(${p.topImage})`;

topLayer.style.backgroundSize=
`${p.imgScale}%`;

topLayer.style.backgroundPosition=
`${p.imgX}% ${p.imgY}%`;

}else{

topLayer.style.backgroundImage=
"";
}

scratchModal.style.display=
"flex";

confirmBtn.style.display=
"none";

topLayer.style.transition=
"0s";

topLayer.style.transform=
"translateX(0)";
}

let startX=0;

topLayer.addEventListener(
"touchstart",
e=>{

startX=
e.touches[0].clientX;
});

topLayer.addEventListener(
"touchmove",
e=>{

if(scratched) return;

let move=
e.touches[0].clientX-startX;

if(move<0) move=0;

let max=
topLayer.offsetWidth;

if(move>max) move=max;

topLayer.style.transform=
`translateX(${move}px)`;

if(move>max*.72){

scratched=true;

topLayer.style.transition=
".25s";

topLayer.style.transform=
`translateX(${max}px)`;
}
});

topLayer.addEventListener(
"touchend",
()=>{

if(!scratched){

topLayer.style.transition=
".3s";

topLayer.style.transform=
"translateX(0)";

return;
}

finishScratch();
});

function finishScratch(){

confirmBtn.style.display=
"block";

let p=pages[currentPage];

if(p.prizes[currentTicket]){

confetti();
}
}

function confirmScratch(){

pages[currentPage]
.used[currentTicket]=true;

saveMemory();

scratchModal.style.display=
"none";

render();
}

/* ===== 彩帶 ===== */

function confetti(){

for(let i=0;i<70;i++){

let div=
document.createElement("div");

div.className="confetti";

div.style.left=
Math.random()*100+"vw";

div.style.background=
`hsl(${Math.random()*360},
100%,50%)`;

document.body.appendChild(div);

let y=-20;

let speed=
Math.random()*6+4;

let rotate=
Math.random()*360;

let timer=
setInterval(()=>{

y+=speed;

rotate+=8;

div.style.top=y+"px";

div.style.transform=
`rotate(${rotate}deg)`;

if(y>window.innerHeight){

clearInterval(timer);

div.remove();
}

},16);
}
}

/* ===== 啟動 ===== */

loadMemory();

render();

</script>

</body>
  </html>
