<!-- =========================
貓蟲家族一番賞 完整升級版
直接存成 index.html 即可使用
========================= -->

<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>貓蟲家族一番賞</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    background:#dfe5ee;
    overflow-x:hidden;
}

/* ================= 頂部 ================= */

.top-bar{
    width:100%;
    background:#cfe8ff;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:15px;
    position:sticky;
    top:0;
    z-index:100;
    border-bottom:4px solid #b7d5f2;
}

.top-btn{
    width:110px;
    height:68px;
    border:none;
    border-radius:24px;
    background:white;
    font-size:20px;
    font-weight:bold;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    cursor:pointer;
}

/* ================= 主題 ================= */

.title-area{
    text-align:center;
    padding:25px 20px 10px;
}

#themeTitle{
    font-size:56px;
    font-weight:bold;
    color:#00d9ff;
    margin-bottom:16px;
}

#noticeText{
    font-size:22px;
    color:#444;
    white-space:pre-wrap;
}

/* ================= 資訊 ================= */

.info-box{
    width:92%;
    margin:auto;
    background:white;
    border-radius:25px;
    padding:18px;
    line-height:2;
    font-size:18px;
    margin-top:18px;
    box-shadow:0 3px 10px rgba(0,0,0,.12);
}

/* ================= 籤紙區 ================= */

.ticket-area{
    padding:24px;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:15px;
}

.ticket{
    aspect-ratio:1/1;
    border-radius:24px;
    background:#4e4e4e;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    transition:.2s;
    user-select:none;

    box-shadow:
    inset 0 2px 4px rgba(255,255,255,.15),
    inset 0 -4px 8px rgba(0,0,0,.3),
    0 4px 10px rgba(0,0,0,.15);
}

.ticket.opened{
    background:white;
    color:black;
    border:3px solid #222;
    pointer-events:none;
}

/* ================= 彈窗 ================= */

.popup-bg{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.popup{
    width:92%;
    max-width:560px;
    max-height:92vh;
    overflow:auto;
    background:white;
    border-radius:28px;
    padding:22px;
}

.popup h2{
    margin-bottom:18px;
}

.input{
    width:100%;
    border:1px solid #ccc;
    border-radius:16px;
    padding:14px;
    margin-bottom:12px;
    font-size:16px;
}

.row{
    display:flex;
    gap:10px;
}

.btn{
    flex:1;
    border:none;
    border-radius:16px;
    padding:14px;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

.save-btn{
    background:#22a7ff;
    color:white;
}

.back-btn{
    background:#ddd;
}

.delete-btn{
    background:#ff4b4b;
    color:white;
}

/* ================= 頁面選單 ================= */

.page-card{
    background:#f5f5f5;
    border-radius:18px;
    padding:15px;
    margin-bottom:12px;
    cursor:pointer;
    border:3px solid transparent;
}

.page-card.active{
    border-color:#00a2ff;
}

.page-scroll{
    max-height:400px;
    overflow:auto;
}

/* ================= 獎項列 ================= */

.prize-line{
    border:1px solid #ddd;
    border-radius:18px;
    padding:12px;
    margin-bottom:12px;
}

/* ================= 抽獎 ================= */

.draw-bg{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.ticket-wrap{
    width:84vw;
    max-width:700px;
    aspect-ratio:7/4;
    position:relative;
}

/* 內層 */

.inner-layer{
    position:absolute;
    inset:0;

    background:
    linear-gradient(
        135deg,
        #ffffff 0%,
        #f2f2f2 50%,
        #e5e5e5 100%
    );

    border-radius:0;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:52px;
    font-weight:bold;

    box-shadow:
    inset 0 0 20px rgba(0,0,0,.08),
    0 5px 20px rgba(0,0,0,.3);
}

/* 外層 */

.outer-layer{
    position:absolute;
    inset:0;

    background:
    linear-gradient(
        135deg,
        #555 0%,
        #1f1f1f 50%,
        #000 100%
    );

    overflow:hidden;
    touch-action:none;

    box-shadow:
    inset 0 0 30px rgba(255,255,255,.1),
    inset 0 -10px 20px rgba(0,0,0,.5),
    0 6px 18px rgba(0,0,0,.35);
}

.outer-layer img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.ticket-id{
    position:absolute;
    top:12px;
    right:12px;
    background:white;
    color:black;
    padding:10px 18px;
    border-radius:18px;
    font-size:20px;
    font-weight:bold;
    z-index:5;
}

.slide-text{
    color:white;
    margin-top:18px;
    font-size:20px;
}

.confirm-btn{
    margin-top:22px;
    border:none;
    border-radius:20px;
    background:white;
    padding:14px 50px;
    font-size:22px;
    font-weight:bold;
    display:none;
}

/* ================= 彩帶 ================= */

.confetti{
    position:fixed;
    width:14px;
    height:14px;
    animation:fall 2s linear forwards;
}

@keyframes fall{

    from{
        transform:
        translateY(-100px)
        rotate(0deg);
    }

    to{
        transform:
        translateY(110vh)
        rotate(720deg);

        opacity:0;
    }

}

</style>
</head>

<body>

<!-- ================= 頂部 ================= -->

<div class="top-bar">

    <button class="top-btn" onclick="openPagePopup()">
        頁數
    </button>

    <button class="top-btn" onclick="resetPage()">
        重置
    </button>

    <button class="top-btn" onclick="openSetting()">
        設定
    </button>

</div>

<!-- ================= 主題 ================= -->

<div class="title-area">

    <div id="themeTitle">
        貓蟲家族一番賞
    </div>

    <div id="noticeText">
        公告欄
    </div>

</div>

<!-- ================= 資訊 ================= -->

<div class="info-box" id="infoBox"></div>

<!-- ================= 籤紙 ================= -->

<div class="ticket-area" id="ticketArea"></div>

<!-- ================= 頁面彈窗 ================= -->

<div class="popup-bg" id="pagePopup">

    <div class="popup">

        <h2>頁面管理</h2>

        <div class="page-scroll" id="pageList"></div>

        <br>

        <button class="btn save-btn"
        onclick="addPage()">
            新增頁面
        </button>

        <br><br>

        <div class="row">

            <button class="btn delete-btn"
            onclick="deletePage()">
                刪除
            </button>

            <button class="btn back-btn"
            onclick="closePagePopup()">
                返回
            </button>

        </div>

    </div>

</div>

<!-- ================= 設定 ================= -->

<div class="popup-bg" id="settingPopup">

<div class="popup">

<h2>設定頁面</h2>

<input class="input"
id="themeInput"
placeholder="主題名稱">

<input type="color"
class="input"
id="themeColor">

<textarea
class="input"
id="noticeInput"
placeholder="公告欄"></textarea>

<input
type="number"
class="input"
id="totalInput"
placeholder="籤紙總數">

<div id="prizeList"></div>

<button class="btn save-btn"
onclick="addPrize()">
新增獎項
</button>

<br><br>

<input class="input"
id="loseText"
placeholder="未中獎文字">

<input type="file"
class="input"
id="imageInput"
accept="image/*">

<div class="row">

<button class="btn save-btn"
onclick="saveSetting()">
儲存設定
</button>

<button class="btn back-btn"
onclick="closeSetting()">
返回
</button>

</div>

</div>
</div>

<!-- ================= 抽獎 ================= -->

<div class="draw-bg" id="drawBg">

<div class="ticket-wrap">

<div class="inner-layer"
id="innerText"></div>

<div class="outer-layer"
id="outerLayer">

<div class="ticket-id"
id="ticketId">
001
</div>

<img id="ticketImg">

</div>

</div>

<div class="slide-text">
向左滑動撕開
</div>

<button class="confirm-btn"
id="confirmBtn"
onclick="closeDraw()">
確認
</button>

</div>

<script>

/* ================= 資料 ================= */

let data = JSON.parse(
localStorage.getItem("lotteryData")
) || {

currentPage:0,

pages:[
{
name:"Capoo的一番賞",
color:"#00d9ff",
notice:"B賞：3000紅包\n共80抽",
total:80,

prizes:[
{
number:"001",
text:"A賞"
},
{
number:"008",
text:"B賞"
}
],

loseText:"銘謝惠顧",

image:"",

opened:[]
}
]

};

let selectedPage = 0;

let currentTicket = "";

/* ================= 儲存 ================= */

function saveData(){

localStorage.setItem(
"lotteryData",
JSON.stringify(data)
);

}

/* ================= 目前頁 ================= */

function page(){

return data.pages[data.currentPage];

}

/* ================= 主畫面 ================= */

function render(){

let p = page();

document.getElementById(
"themeTitle"
).innerText = p.name;

document.getElementById(
"themeTitle"
).style.color = p.color;

document.getElementById(
"noticeText"
).innerText = p.notice;

let remain =
p.total - p.opened.length;

let html = `
<div>總數：${p.total}</div>
<div>剩餘：${remain}</div>
`;

let map = {};

p.prizes.forEach(a=>{

map[a.text] =
(map[a.text]||0)+1;

});

for(let k in map){

html += `
<div>${k} 數量：${map[k]}</div>
`;

}

document.getElementById(
"infoBox"
).innerHTML = html;

/* 籤紙 */

let area =
document.getElementById(
"ticketArea"
);

area.innerHTML = "";

for(let i=1;i<=p.total;i++){

let num =
String(i).padStart(3,"0");

let div =
document.createElement("div");

div.className = "ticket";

if(p.opened.includes(num)){

div.classList.add("opened");

}

div.innerText = num;

div.onclick = ()=>{

openTicket(num);

};

area.appendChild(div);

}

saveData();

}

/* ================= 頁面管理 ================= */

function openPagePopup(){

document.getElementById(
"pagePopup"
).style.display = "flex";

renderPageList();

}

function closePagePopup(){

document.getElementById(
"pagePopup"
).style.display = "none";

}

function renderPageList(){

let list =
document.getElementById(
"pageList"
);

list.innerHTML = "";

data.pages.forEach((p,i)=>{

let div =
document.createElement("div");

div.className =
"page-card";

if(i==data.currentPage){

div.classList.add("active");

}

div.innerHTML = `
<b>${p.name}</b><br>
共 ${p.total} 抽
`;

div.onclick = ()=>{

selectedPage = i;

data.currentPage = i;

render();
renderPageList();

};

list.appendChild(div);

});

}

function addPage(){

let name =
prompt("輸入頁面名稱");

if(!name) return;

data.pages.push({

name:name,

color:"#00d9ff",

notice:"",

total:80,

prizes:[
{
number:"001",
text:"A賞"
}
],

loseText:"銘謝惠顧",

image:"",

opened:[]

});

data.currentPage =
data.pages.length-1;

render();

renderPageList();

}

function deletePage(){

if(data.pages.length<=1){

alert("至少保留一頁");

return;

}

if(confirm("是否刪除該頁面？")){

data.pages.splice(
data.currentPage,
1
);

data.currentPage = 0;

render();

renderPageList();

}

}

/* ================= 重置 ================= */

function resetPage(){

if(!confirm(
"是否重置目前頁面？"
)) return;

page().opened = [];

saveData();

render();

}

/* ================= 設定 ================= */

function openSetting(){

let p = page();

document.getElementById(
"settingPopup"
).style.display = "flex";

document.getElementById(
"themeInput"
).value = p.name;

document.getElementById(
"themeColor"
).value = p.color;

document.getElementById(
"noticeInput"
).value = p.notice;

document.getElementById(
"totalInput"
).value = p.total;

document.getElementById(
"loseText"
).value = p.loseText;

document.getElementById(
"prizeList"
).innerHTML = "";

p.prizes.forEach(a=>{

createPrize(
a.number,
a.text
);

});

}

function closeSetting(){

document.getElementById(
"settingPopup"
).style.display = "none";

}

function addPrize(){

createPrize(
"001",
""
);

}

function createPrize(number,text){

let div =
document.createElement("div");

div.className =
"prize-line";

div.innerHTML = `

<input
class="input numInput"
value="${number}"
placeholder="編號">

<input
class="input textInput"
value="${text}"
placeholder="獎項文字">

<button
class="btn delete-btn"
onclick="removePrize(this)">
刪除
</button>

`;

document.getElementById(
"prizeList"
).appendChild(div);

}

function removePrize(btn){

let lines =
document.querySelectorAll(
".prize-line"
);

if(lines.length<=1){

alert("至少保留一行");

return;

}

btn.parentElement.remove();

}

function saveSetting(){

if(!confirm(
"是否確定儲存"
)) return;

let p = page();

p.name =
document.getElementById(
"themeInput"
).value;

p.color =
document.getElementById(
"themeColor"
).value;

p.notice =
document.getElementById(
"noticeInput"
).value;

p.total =
Number(
document.getElementById(
"totalInput"
).value
);

p.loseText =
document.getElementById(
"loseText"
).value;

let arr = [];

document.querySelectorAll(
".prize-line"
).forEach(line=>{

let num =
line.querySelector(
".numInput"
).value;

num =
String(
Number(num)
).padStart(3,"0");

let text =
line.querySelector(
".textInput"
).value;

arr.push({
number:num,
text:text
});

});

if(arr.length > p.total){

alert(
"數量不符無法儲存"
);

return;

}

p.prizes = arr;

/* 圖片 */

let file =
document.getElementById(
"imageInput"
).files[0];

if(file){

let reader =
new FileReader();

reader.onload = e=>{

p.image =
e.target.result;

saveData();

render();

};

reader.readAsDataURL(file);

}

saveData();

render();

closeSetting();

}

/* ================= 抽獎 ================= */

function openTicket(num){

if(!confirm(
"是否選擇 "+num+" 號？"
)) return;

currentTicket = num;

let p = page();

let prize =
p.prizes.find(
a=>a.number==num
);

let text =
prize ?
prize.text :
p.loseText;

document.getElementById(
"drawBg"
).style.display = "flex";

document.getElementById(
"innerText"
).innerText = text;

document.getElementById(
"ticketId"
).innerText = num;

document.getElementById(
"ticketImg"
).src = p.image || "";

initSlide(text);

}

/* ================= 撕開 ================= */

function initSlide(text){

let outer =
document.getElementById(
"outerLayer"
);

outer.style.display =
"block";

outer.style.transform =
"translateX(0px)";

let startX = 0;

outer.onpointerdown = e=>{

startX = e.clientX;

outer.onpointermove = ev=>{

let move =
ev.clientX - startX;

if(move < 0) move = 0;

outer.style.transform =
`translateX(${move}px)`;

let width =
outer.offsetWidth;

if(move > width*0.8){

outer.style.display =
"none";

finishDraw(text);

}

};

};

outer.onpointerup = ()=>{

outer.onpointermove = null;

};

}

/* ================= 完成 ================= */

function finishDraw(text){

let p = page();

if(!p.opened.includes(
currentTicket
)){

p.opened.push(
currentTicket
);

}

if(text != p.loseText){

confettiEffect();

}

document.getElementById(
"confirmBtn"
).style.display =
"block";

render();

}

/* ================= 彩帶 ================= */

function confettiEffect(){

for(let i=0;i<120;i++){

let c =
document.createElement("div");

c.className =
"confetti";

c.style.left =
Math.random()*100+"vw";

c.style.background =
`hsl(${Math.random()*360}deg,100%,50%)`;

document.body.appendChild(c);

setTimeout(()=>{

c.remove();

},2000);

}

}

/* ================= 關閉 ================= */

function closeDraw(){

document.getElementById(
"drawBg"
).style.display =
"none";

document.getElementById(
"confirmBtn"
).style.display =
"none";

}

/* ================= 啟動 ================= */

render();

</script>

</body>
</html>
