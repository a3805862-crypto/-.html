<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>貓蟲家族一番賞</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft JhengHei",sans-serif;
}

body{
background:#edf5ff;
overflow-x:hidden;
}

/* ===== 標題 ===== */

.header{
background:#4da7ff;
color:#000;
text-align:center;
font-size:34px;
font-weight:900;
padding:18px;
letter-spacing:2px;
transition:.3s;
}

/* ===== 功能列 ===== */

.topBar{
background:#d9ebff;
display:flex;
justify-content:center;
gap:10px;
padding:12px;
border-bottom:2px solid #bddcff;
}

.btn{
border:none;
background:#fff;
padding:12px 18px;
border-radius:14px;
font-size:15px;
font-weight:900;
cursor:pointer;
box-shadow:0 3px 10px rgba(0,0,0,.15);
}

.btn:active{
transform:scale(.95);
}

/* ===== 主畫面 ===== */

.pageArea{
padding:14px;
}

.pageTitle{
text-align:center;
font-size:30px;
font-weight:900;
}

.pageNotice{
text-align:center;
color:#444;
margin-top:6px;
margin-bottom:18px;
white-space:pre-wrap;
}

/* ===== 籤紙 ===== */

.ticketGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.ticket{
aspect-ratio:1/1;
border-radius:14px;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:900;
cursor:pointer;
user-select:none;
transition:.2s;
}

.ticket.used{
background:#777 !important;
color:#fff !important;
pointer-events:none;
}

/* ===== 彈窗 ===== */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.modalBox{
width:92%;
max-width:450px;
max-height:90vh;
overflow:auto;
background:#fff;
border-radius:20px;
padding:18px;
}

.modalTitle{
font-size:25px;
font-weight:900;
margin-bottom:15px;
}

.input{
width:100%;
padding:11px;
border-radius:12px;
border:1px solid #ccc;
margin-bottom:12px;
}

.row{
display:flex;
gap:8px;
margin-bottom:10px;
}

.row input{
flex:1;
}

/* ===== 撕開 ===== */

.scratchModal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
justify-content:center;
align-items:center;
z-index:5000;
}

.scratchWrap{
width:92%;
max-width:480px;
}

.scratchCard{
position:relative;
width:100%;
aspect-ratio:7/3;
overflow:hidden;
border-radius:20px;
}

/* ===== 底層 ===== */

.bottomLayer{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
font-weight:900;
letter-spacing:2px;
}

/* ===== 表層 ===== */

.topLayer{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:20px;
font-weight:900;
touch-action:none;
overflow:hidden;
background-size:cover;
background-position:center;
}

.paperTexture{
position:absolute;
inset:0;
opacity:.18;
background-image:
radial-gradient(#999 1px, transparent 1px);
background-size:8px 8px;
}

/* ===== 確認 ===== */

.confirmBtn{
width:100%;
margin-top:16px;
border:none;
background:#4da7ff;
color:#fff;
padding:15px;
border-radius:14px;
font-size:18px;
font-weight:900;
display:none;
}

/* ===== 彩帶 ===== */

.confetti{
position:fixed;
width:10px;
height:10px;
top:-20px;
z-index:99999;
}

</style>
</head>

<body>

<div class="header" id="header">
貓蟲家族一番賞
</div>

<div class="topBar">

<button class="btn" onclick="openPageModal()">
頁數
</button>

<button class="btn" onclick="resetPage()">
重置
</button>

<button class="btn" onclick="openSetting()">
設定
</button>

</div>

<div class="pageArea">

<div class="pageTitle" id="pageTitle"></div>

<div class="pageNotice" id="pageNotice"></div>

<div class="ticketGrid" id="ticketGrid"></div>

</div>

<!-- ===== 頁數 ===== -->

<div class="modal" id="pageModal">

<div class="modalBox">

<div class="modalTitle">
頁數管理
</div>

<select class="input" id="pageSelect"></select>

<button class="btn" onclick="switchPage()">
切換頁面
</button>

<button class="btn" onclick="addPage()">
新增頁面
</button>

<button class="btn" onclick="deletePage()">
刪除頁面
</button>

<button class="btn" onclick="closePageModal()">
返回
</button>

</div>
</div>

<!-- ===== 設定 ===== -->

<div class="modal" id="settingModal">

<div class="modalBox">

<div class="modalTitle">
頁面設定
</div>

<div>上方主標題文字</div>
<input class="input" id="headerText">

<div>主標題背景色</div>
<input type="color" class="input" id="headerBg">

<div>主標題文字顏色</div>
<input type="color" class="input" id="headerColor">

<hr style="margin:15px 0;">

<div>名稱</div>
<input class="input" id="setTitle">

<div>獎品告示欄</div>
<textarea class="input" id="setNotice"></textarea>

<div>籤紙總數</div>
<input type="number" class="input" id="setTotal">

<div>方形籤紙顏色</div>
<input type="color" class="input" id="ticketColor">

<div>方形籤紙文字顏色</div>
<input type="color" class="input" id="ticketTextColor">

<hr style="margin:15px 0;">

<div>刮開底層顏色</div>
<input type="color" class="input" id="bottomColor">

<div>刮開底層文字顏色</div>
<input type="color" class="input" id="bottomTextColor">

<div>刮開表層顏色</div>
<input type="color" class="input" id="topColor">

<div>刮開表層文字顏色</div>
<input type="color" class="input" id="topTextColor">

<div>表層圖片</div>
<input type="file"
class="input"
id="topImage"
accept="image/*">

<hr style="margin:15px 0;">

<div>中獎文字與編號</div>

<div id="prizeArea"></div>

<button class="btn"
onclick="addPrizeRow()">
新增獎項
</button>

<hr style="margin:15px 0;">

<div>未設定獎品文字</div>

<input class="input"
id="defaultText"
placeholder="未中獎">

<button class="btn"
onclick="saveSetting()">
儲存
</button>

<button class="btn"
onclick="cancelSetting()">
取消
</button>

<button class="btn"
onclick="closeSetting()">
返回
</button>

</div>
</div>

<!-- ===== 刮開 ===== -->

<div class="scratchModal"
id="scratchModal">

<div class="scratchWrap">

<div class="scratchCard">

<div class="bottomLayer"
id="scratchText"></div>

<div class="topLayer"
id="topLayer">

<div class="paperTexture"></div>

← 由左向右撕開

</div>

</div>

<button class="confirmBtn"
id="confirmBtn"
onclick="confirmScratch()">

確認

</button>

</div>
</div>

<script>

/* ===== 儲存 ===== */

function saveMemory(){

localStorage.setItem(
"catbugKujiData",
JSON.stringify({

pages,
headerData,
currentPage

})
);
}

function loadMemory(){

let data=
localStorage.getItem(
"catbugKujiData"
);

if(data){

let obj=JSON.parse(data);

pages=obj.pages;
headerData=obj.headerData;
currentPage=obj.currentPage;
}
}

/* ===== 預設 ===== */

let pages=[{

title:"預設頁",
notice:"歡迎抽獎",
total:12,

prizes:{
"003":"A賞",
"008":"B賞"
},

defaultText:"未中獎",

used:{},

ticketColor:"#000000",
ticketTextColor:"#ffffff",

bottomColor:"#ffffff",
bottomTextColor:"#000000",

topColor:"#d9d9d9",
topTextColor:"#555555",

topImage:""

}];

/* ===== 標題 ===== */

let headerData={

text:"貓蟲家族一番賞",
bg:"#4da7ff",
color:"#000000"

};

let currentPage=0;
let currentTicket="";
let scratched=false;

/* ===== 三位數 ===== */

function formatNumber(v){

v=v.replace(/\D/g,'');

if(v==="") return "";

return String(parseInt(v))
.padStart(3,"0");
}

/* ===== 標題 ===== */

function renderHeader(){

header.innerText=
headerData.text;

header.style.background=
headerData.bg;

header.style.color=
headerData.color;
}

/* ===== 渲染 ===== */

function render(){

renderHeader();

let p=pages[currentPage];

pageTitle.innerText=p.title;

pageNotice.innerText=p.notice;

ticketGrid.innerHTML="";

for(let i=1;i<=p.total;i++){

let num=
String(i).padStart(3,"0");

let div=document.createElement("div");

div.className="ticket";

if(p.used[num]){
div.classList.add("used");
}

div.style.background=
p.ticketColor;

div.style.color=
p.ticketTextColor;

div.innerText=num;

div.onclick=()=>openScratch(num);

ticketGrid.appendChild(div);
}
}

/* ===== 頁數 ===== */

function openPageModal(){

pageModal.style.display="flex";

pageSelect.innerHTML="";

pages.forEach((p,index)=>{

let op=document.createElement("option");

op.value=index;

op.innerText=
`${index+1}. ${p.title}`;

pageSelect.appendChild(op);

});

pageSelect.value=currentPage;
}

function closePageModal(){
pageModal.style.display="none";
}

function switchPage(){

currentPage=
parseInt(pageSelect.value);

saveMemory();

closePageModal();

render();
}

function addPage(){

pages.push({

title:"新頁面",
notice:"",
total:12,

prizes:{},

defaultText:"未中獎",

used:{},

ticketColor:"#000000",
ticketTextColor:"#ffffff",

bottomColor:"#ffffff",
bottomTextColor:"#000000",

topColor:"#d9d9d9",
topTextColor:"#555555",

topImage:""

});

currentPage=
pages.length-1;

saveMemory();

closePageModal();

render();
}

function deletePage(){

if(pages.length<=1){

alert("至少保留一頁");

return;
}

if(confirm("確定刪除？")){

pages.splice(currentPage,1);

currentPage=0;

saveMemory();

closePageModal();

render();
}
}

/* ===== 設定 ===== */

function openSetting(){

let p=pages[currentPage];

settingModal.style.display="flex";

headerText.value=
headerData.text;

headerBg.value=
headerData.bg;

headerColor.value=
headerData.color;

setTitle.value=p.title;

setNotice.value=p.notice;

setTotal.value=p.total;

defaultText.value=p.defaultText;

ticketColor.value=p.ticketColor;

ticketTextColor.value=
p.ticketTextColor;

bottomColor.value=p.bottomColor;

bottomTextColor.value=
p.bottomTextColor;

topColor.value=p.topColor;

topTextColor.value=
p.topTextColor;

prizeArea.innerHTML="";

let keys=
Object.keys(p.prizes);

if(keys.length===0){

addPrizeRow();

}else{

keys.forEach(k=>{

addPrizeRow(
k,
p.prizes[k]
);

});
}
}

function closeSetting(){

settingModal.style.display=
"none";
}

function cancelSetting(){

if(confirm("確定取消設定？")){

closeSetting();
}
}

function addPrizeRow(
num="",
text=""
){

let div=
document.createElement("div");

div.className="row";

div.innerHTML=`

<input
placeholder="編號"
value="${num}"
oninput="
this.value=
formatNumber(this.value)
">

<input
placeholder="中獎文字"
value="${text}">

<button
class="btn"
onclick="removePrizeRow(this)">

刪除

</button>
`;

prizeArea.appendChild(div);
}

function removePrizeRow(btn){

if(prizeArea.children.length<=1){

alert("至少保留一行");

return;
}

btn.parentElement.remove();
}

function saveSetting(){

if(!confirm("確定儲存設定？")){
return;
}

let total=
parseInt(setTotal.value);

let rows=
prizeArea.querySelectorAll(".row");

let prizes={};

let count=0;

rows.forEach(r=>{

let num=
r.children[0].value.trim();

let text=
r.children[1].value.trim();

if(num && text){

prizes[num]=text;

count++;
}
});

if(count>total){

alert("數量不符無法儲存");

return;
}

let file=
topImage.files[0];

let imageData=
pages[currentPage].topImage;

function finishSave(){

headerData.text=
headerText.value;

headerData.bg=
headerBg.value;

headerData.color=
headerColor.value;

pages[currentPage]={

...pages[currentPage],

title:setTitle.value,

notice:setNotice.value,

total:total,

prizes:prizes,

defaultText:
defaultText.value || "未中獎",

ticketColor:
ticketColor.value,

ticketTextColor:
ticketTextColor.value,

bottomColor:
bottomColor.value,

bottomTextColor:
bottomTextColor.value,

topColor:
topColor.value,

topTextColor:
topTextColor.value,

topImage:imageData

};

saveMemory();

closeSetting();

render();
}

if(file){

let reader=
new FileReader();

reader.onload=e=>{

imageData=e.target.result;

finishSave();
};

reader.readAsDataURL(file);

}else{

finishSave();
}
}

/* ===== 重置 ===== */

function resetPage(){

if(confirm("確定重置本頁抽獎狀態？")){

pages[currentPage].used={};

saveMemory();

render();
}
}

/* ===== 刮開 ===== */

function openScratch(num){

currentTicket=num;

scratched=false;

let p=pages[currentPage];

let text=
p.prizes[num] ||
p.defaultText;

scratchText.innerText=text;

scratchText.style.background=
p.bottomColor;

scratchText.style.color=
p.bottomTextColor;

topLayer.style.background=
p.topColor;

topLayer.style.color=
p.topTextColor;

if(p.topImage){

topLayer.style.backgroundImage=
`url(${p.topImage})`;

}else{

topLayer.style.backgroundImage=
"";
}

scratchModal.style.display=
"flex";

confirmBtn.style.display=
"none";

topLayer.style.transition=
"0s";

topLayer.style.transform=
"translateX(0)";
}

let startX=0;

topLayer.addEventListener(
"touchstart",
e=>{

startX=
e.touches[0].clientX;
});

topLayer.addEventListener(
"touchmove",
e=>{

if(scratched) return;

let move=
e.touches[0].clientX-startX;

if(move<0) move=0;

let max=
topLayer.offsetWidth;

if(move>max) move=max;

topLayer.style.transform=
`translateX(${move}px)`;

if(move>max*0.75){

scratched=true;

topLayer.style.transition=
".25s";

topLayer.style.transform=
`translateX(${max}px)`;
}
});

topLayer.addEventListener(
"touchend",
()=>{

if(!scratched){

topLayer.style.transition=
".3s";

topLayer.style.transform=
"translateX(0)";

return;
}

finishScratch();
});

function finishScratch(){

confirmBtn.style.display=
"block";

let p=pages[currentPage];

if(p.prizes[currentTicket]){

confetti();
}
}

function confirmScratch(){

pages[currentPage]
.used[currentTicket]=true;

saveMemory();

scratchModal.style.display=
"none";

render();
}

/* ===== 彩帶 ===== */

function confetti(){

for(let i=0;i<60;i++){

let div=
document.createElement("div");

div.className="confetti";

div.style.left=
Math.random()*100+"vw";

div.style.background=
`hsl(${Math.random()*360},
100%,50%)`;

document.body.appendChild(div);

let y=-20;

let speed=
Math.random()*6+5;

let rotate=
Math.random()*360;

let timer=
setInterval(()=>{

y+=speed;

rotate+=8;

div.style.top=y+"px";

div.style.transform=
`rotate(${rotate}deg)`;

if(y>window.innerHeight){

clearInterval(timer);

div.remove();
}

},16);
}
}

/* ===== 啟動 ===== */

loadMemory();

render();

</script>

</body>
</html>
